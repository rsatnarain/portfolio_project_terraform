# Author: Rob Satnarain
# Creation Date: 2026-04-29
# Description: CI/CD Pipeline for Next.js Static Export to AWS S3 & CloudFront
# Trigger: PRs to main (Build only) and Pushes to main (Build & Deploy)

name: Production Deployment

on:
  push:
    branches:
      - main
  # Trigger the workflow when a PR is opened against the main branch
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # This runs on BOTH PRs and Pushes to ensure your code isn't broken
      - name: Build Next.js Site
        run: npm run build

      # =====================================================================
      # AWS DEPLOYMENT STEPS (ONLY RUNS ON MERGE/PUSH TO MAIN)
      # =====================================================================

      - name: Configure AWS Credentials using OIDC
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: aws s3 sync ./out s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront Cache
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"