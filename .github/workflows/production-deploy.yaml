# Author: Rob Satnarain
# Creation Date: 2026-04-29
# Description: CI/CD Pipeline for Next.js Static Export to AWS S3 & CloudFront
# Trigger: PRs to main (Build only) and Pushes to main (Build & Deploy)
# Updated By     Update Date   Version   Description
# -----------------------------------------------------------------------------------------------
# Rob            2026-04-29.    1.0.     Initial Create --- IGNORE ---  
# Rob            2026-04-29.    1.1.     Fix: Set default working directory for all 'run' commands to './nextjs-blog' to ensure correct context for build and deployment steps, and explicitly specify the cache dependency path for Node.js dependencies to improve caching efficiency in GitHub Actions. This enhancement ensures that all commands are executed in the correct directory where the Next.js application resides, preventing potential issues with file paths during the build and deployment process. Additionally, by defining the cache dependency path, we can optimize caching of Node.js modules, leading to faster build times and more efficient use of resources in the CI/CD pipeline.

name: Production Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy to AWS
    runs-on: ubuntu-latest

    # FIX 1: Set the default working directory for all 'run' commands in this job
    defaults:
      run:
        working-directory: ./nextjs-blog

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'
          # FIX 2: Explicitly tell the action where the lock file is for caching
          cache-dependency-path: './nextjs-blog/package-lock.json'

      # Because of the default working-directory, this automatically runs in ./nextjs-blog
      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js Site
        run: npm run build

      # =====================================================================
      # AWS DEPLOYMENT STEPS (ONLY RUNS ON MERGE/PUSH TO MAIN)
      # =====================================================================

      - name: Configure AWS Credentials using OIDC
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # The './out' path works perfectly here because we are already inside ./nextjs-blog
      - name: Deploy to S3
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: aws s3 sync ./out s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront Cache
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"