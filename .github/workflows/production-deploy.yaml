# Author: Rob Satnarain
# Description: CI/CD Pipeline for Next.js Static Export to AWS S3 & CloudFront
# Trigger: Pushes to the main branch

name: Production Deployment

on:
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull down the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up the Node environment for Next.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Update this if you are using a different Node version
          cache: 'npm'

      # Step 3: Install project dependencies cleanly
      - name: Install Dependencies
        run: npm ci

      # Step 4: Build the Next.js static files (generates the 'out' folder)
      - name: Build Next.js Site
        run: npm run build

      # Step 5: Authenticate with AWS securely using GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Step 6: Sync the built files to the private S3 bucket
      # The --delete flag ensures removed files in your code are also removed from S3
      - name: Deploy to S3
        run: aws s3 sync ./out s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete

      # Step 7: Bust the CloudFront cache so new updates show immediately
      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"